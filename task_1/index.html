<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout with HTML5 Semantic Tags</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background: #f5f8fa;
        }
        header, nav, main, aside, footer {
            background: #e9eef1;
            margin-bottom: 10px;
            padding: 30px 0;
            text-align: center;
            font-size: 1.2em;
        }
        .container {
            display: flex;
            gap: 10px;
        }
        aside {
            flex: 1;
        }
        main {
            flex: 2;
        }
        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }
            aside, main {
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <header>Header</header>
    <nav>Navigation Menu</nav>
    <section class="container">
        <aside>Content</aside>
        <main>Main Content</main>
        <aside>Content</aside>
    </section>
    <footer>Footer</footer>
</body>
</html>
