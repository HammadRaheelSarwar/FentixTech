<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Conversion</title>
    <link rel="icon" href="favicon.jpg" type="image/jpeg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header Section -->
    <header class="main-header">
        <img src="logo.png" alt="Logo" class="logo">
        <!-- Add navigation or header content here if present in design -->
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <img src="top_screens.png" alt="Top Screens" class="hero-image">
        <div class="hero-content">
            <h1>Welcome to Our App</h1>
            <p>Your description or tagline goes here.</p>
            <div class="store-buttons">
                <a href="#"><img src="app_store.png" alt="App Store"></a>
                <a href="#"><img src="play_store.png" alt="Play Store"></a>
            </div>
        </div>
    </section>

    <!-- Features Section -->
    <section class="features">
        <img src="for_screens.png" alt="Feature Screens" class="features-image">
        <img src="sec_screens.png" alt="Secondary Screens" class="features-image">
        <img src="thhh_screens.png" alt="Third Screens" class="features-image">
    </section>

    <!-- Footer Section -->
    <footer class="main-footer">
        <img src="peratude.png" alt="Peratude Logo" class="footer-logo">
        <p>&copy; 2026 Your Company. All rights reserved.</p>
    </footer>
</body>
</html>
